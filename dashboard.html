<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SaaS Dashboard UI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="dashboard-layout">
      <aside id="sidebar" class="sidebar"></aside>

      <main class="main-panel">
        <header id="navbar" class="navbar"></header>

        <section class="stats-grid" id="statsCards"></section>

        <section class="content-grid">
          <div class="panel chart-panel">
            <div class="panel-header">
              <h2>Revenue Overview</h2>
              <button class="ghost-button" type="button">Export</button>
            </div>
            <div class="chart-placeholder" role="img" aria-label="Chart placeholder">
              <div class="chart-mock"></div>
              <p>Interactive chart area placeholder</p>
            </div>
          </div>

          <div class="panel table-panel">
            <div class="panel-header">
              <h2>Recent Activity</h2>
              <button class="ghost-button" type="button">View all</button>
            </div>
            <div id="activityTable"></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
